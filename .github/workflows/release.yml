name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  TLS_CLIENT_SKIP_DOWNLOAD: "1"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Validate package
        run: yarn run ci:check

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Validate tag points to current default branch
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$DEFAULT_BRANCH" --depth=1
          DEFAULT_BRANCH_SHA=$(git rev-parse "origin/$DEFAULT_BRANCH")
          if [ "$GITHUB_SHA" != "$DEFAULT_BRANCH_SHA" ]; then
            echo "Release tags must point to the current origin/$DEFAULT_BRANCH commit."
            echo "Tagged commit: $GITHUB_SHA"
            echo "Default branch commit: $DEFAULT_BRANCH_SHA"
            exit 1
          fi

      - name: Pack tarball
        run: npm pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: tls-client-node-*.tgz

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download tarball artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: release-artifacts

      - name: Publish to npm
        run: npm publish ./release-artifacts/*.tgz --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-artifacts/*.tgz
